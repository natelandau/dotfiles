[packages.apt]
    # bat/eza/fd-find moved to mise ([packages.mise]); remove the apt copies (and the
    # eza custom repo) from Linux hosts. See run_onchange_after_10_remove_packages.sh.tmpl.
    to_remove = ["bat", "btop", "eza", "fd-find", "htop"]
    [packages.apt.common]
        packages = [
            "apt-transport-https",
            "curl",
            "dnsutils",
            "figlet",
            "fzf",
            "git",
            "git-extras",
            "gnupg",
            "gpg",
            "jq",
            "logrotate",
            "lolcat",
            "mc",                  # Midnight Commander
            "nano",
            "ncdu",                # NCurses Disk Usage
            "needrestart",
            "net-tools",
            "openssh-server",
            "p7zip-full",
            "ripgrep",             # search tool like grep and the silver searcher
            "sudo",
            "tzdata",
            "unzip",
            "wget",
            "zsh",
        ]
    [packages.apt.dev_computer]
        packages = []
    [packages.apt.homelab_member]
        packages = ["iperf"]
    [packages.apt.personal_computer]
        packages = []
[packages.python]
    to_remove = []
    [packages.python.common]
        packages = ["git-gx", "halper", "pygments"]
    [packages.python.dev_computer]
        packages = ["ansible-core", "cookiecutter"]
    [packages.python.homelab_member]
        packages = ["nomadctl"]
    [packages.python.personal_computer]
        packages = ["nomadctl", "vid-cleaner"]
[packages.homebrew]
    # atuin/bat/bottom/doggo/fd/git-delta/lazygit/rip2/zoxide moved to mise ([packages.mise]);
    # uninstall the Homebrew copies so mise owns them on macOS. (eza stays on brew: it has
    # no macOS release binary, so mise only manages it on Linux.)
    to_remove = ["bruno", "dbeaver-community", "iterm2", "redis"]
    [packages.homebrew.common]
        casks = [
            "1password",
            "1password-cli",
            "espanso",                       # Text expander
            "font-departure-mono",
            "font-jetbrains-mono-nerd-font",
            "font-maple-mono",               # https://font.subf.dev/en/
            "font-maple-mono-nf",            # https://font.subf.dev/en/
            "font-maple-mono-nf-cn",         # https://font.subf.dev/en/
            "font-meslo-lg-dz",
            "font-meslo-lg-nerd-font",
            "ghostty",
            "git-credential-manager",
            "grandperspective",              # Disk usage visualizer
            "lingon-x",
            "orbstack",                      # Docker replacement
            "tailscale",
            "visual-studio-code",
        ]
        formulae = [
            "bash",
            "bash-completion",
            "chezmoi",         # Dotfile manager
            "coreutils",
            "eza",             # ls replacement (mise has no macOS binary for eza; brew owns it here)
            "findutils",       # GNU find, locate, updatedb, and xargs
            "fzf",             # Fuzzy finder
            "gawk",            # GNU awk
            "git",
            "gnu-sed",         # GNU implementation of the famous stream editor
            "gnu-tar",         # GNU version of the tar archiving utility
            "gnutls",          # GNU Transport Layer Security (TLS) Library
            "gping",           # Ping, but with a graph
            "grep",
            "jq",              # Lightweight and flexible command-line JSON processor
            "mas",             # Mac App Store command-line interface
            "mc",              # Midnight Commander
            "most",            # Pager
            "nano",
            "ncdu",            # NCurses Disk Usage
            "ncurses",         # Text-based UI library
            "openssl",         # SSL/TLS cryptography library
            "ripgrep",         # search tool like grep and the silver searcher
            "sqlite3",
            "ssh-copy-id",     # Add a public key to a remote machine's authorized_keys file
            "tealdeer",        # TLDR man pages
