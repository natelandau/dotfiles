[packages.mise]
    # Cross-platform CLI binaries installed by mise on both macOS and Linux.
    # Refs use the aqua registry where available, falling back to the github backend.
    # Tools in 'to_remove' are uninstalled via 'mise uninstall'; keep them disjoint
    # from the install lists below or they will flip-flop on each apply.
    to_remove = []
    [packages.mise.common]
        tools = [
            # atuin's version is pinned per-arch in mise config.toml.tmpl: 18.13.6 on
            # aarch64 Linux (Raspberry Pi) to dodge the broken interactive TUI in
            # 18.16.x (atuinsh/atuin#3472); latest everywhere else. Skipped on Intel
            # Macs (dropped x86_64-apple-darwin binary); installed manually there.
            "aqua:ClementTsang/bottom", # btm: process/system monitor
            "aqua:atuinsh/atuin",       # better shell history
            "aqua:dandavison/delta",    # syntax-highlighting pager for git diffs (skipped on Intel Macs; see mise config.toml.tmpl)
            "aqua:sharkdp/bat",         # cat with syntax highlighting (mise binary is 'bat', so no batcat symlink needed)
            # eza ships no macOS release binaries, so mise installs it on Linux only
            # (see config.toml.tmpl); macOS keeps the Homebrew formula.
            "aqua:eza-community/eza", # ls replacement
            # fd dropped its x86_64-apple-darwin binary, so it is skipped on Intel Macs
            # (install manually there); see config.toml.tmpl.
            "aqua:ajeetdsouza/zoxide",  # a faster way to navigate the filesystem
            "aqua:sharkdp/fd",          # fd-find (mise binary is 'fd', so no fdfind symlink needed)
            "github:MilesCranmer/rip2", # rip: a safer, rust-based rm
        ]
    [packages.mise.dev_computer]
        tools = [
            "aqua:jesseduffield/lazygit", # terminal UI for git
            # github backend + matching_regex selects the CLI build and excludes the
            # 'doggo_web_' release variant; the aqua registry's macOS asset names are stale.
            "github:mr-karan/doggo[matching_regex=^doggo-]", # command-line DNS client
        ]
    [packages.mise.homelab_member]
        tools = []
    [packages.mise.personal_computer]
        tools = []
[packages.mas]
    [packages.mas.common]
