            "zsh",
        ]
    [packages.homebrew.dev_computer]
        casks = [
            "fork",
            # "sourcetree", # Alternative to fork
            "cursor",
            "lingon-x",
        ]
        formulae = [
            "act",        # runs GitHub Actions locally
            "bats-core",
